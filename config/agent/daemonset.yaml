---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vntopo-agent
  namespace: vntopo-system
  labels:
    app.kubernetes.io/name: vntopo-operator
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vntopo-operator
      app.kubernetes.io/component: agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vntopo-operator
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: vntopo-agent
      hostNetwork: true   # 必需：agent 直接在 host netns 上 LinkAdd 创建 veth
      hostPID: true       # 必需：通过 /proc/<sandbox-pid>/ns/net 看到 pod netns
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists           # 跑在每个 node 上，包括 master
      terminationGracePeriodSeconds: 10
      containers:
        - name: agent
          image: agent:dev           # 由 kustomize edit set image 替换
          # dev 阶段固定 :dev tag，每次 push 后 rollout restart 即重新拉取。
          imagePullPolicy: Always
          args:
            - --socket-path=/var/run/vntopo/agent.sock
            - --docker-socket=/var/run/docker.sock
            - --host-proc=/proc
            - --underlay-iface=$(VNTOPO_UNDERLAY_IFACE)
            - --node-name-env=NODE_NAME
            - --node-ip-env=NODE_IP
            - --workers=4
            - --drift-scan-sec=60
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: VNTOPO_UNDERLAY_IFACE
              value: ""              # 空 = M3 中自动探测默认路由出接口
          securityContext:
            privileged: true         # 必需：操作 netlink / netns / vxlan
            capabilities:
              add: [NET_ADMIN, SYS_ADMIN, NET_RAW]
          volumeMounts:
            # init 容器拨进来的 unix socket 暴露目录（双方共用同一 hostPath）
            - name: agent-sock-dir
              mountPath: /var/run/vntopo
            # 挂载宿主 netns 目录，方便日后 `ip netns add` 类操作（M3 中可能用到）
            - name: host-netns
              mountPath: /var/run/netns
              mountPropagation: HostToContainer
            # M2 关键：调 docker API 找 sandbox 容器拿 PID
            # 拿到 PID 后用容器自己的 /proc/<pid>/ns/net（hostPID:true 让 /proc
            # 直接看到宿主进程，所以无需额外 bind /host/proc）
            - name: docker-sock
              mountPath: /var/run/docker.sock
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: agent-sock-dir
          hostPath:
            path: /var/run/vntopo
            type: DirectoryOrCreate
        - name: host-netns
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
