---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vntopo-agent
  namespace: vntopo-system
  labels:
    app.kubernetes.io/name: vntopo-operator
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vntopo-operator
      app.kubernetes.io/component: agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vntopo-operator
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: vntopo-agent
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists           # 跑在每个 node 上，包括 master
      terminationGracePeriodSeconds: 10
      containers:
        - name: agent
          image: agent:dev           # 由 kustomize edit set image 替换
          imagePullPolicy: IfNotPresent
          args:
            - --socket-path=/var/run/vntopo/agent.sock
            - --underlay-iface=$(VNTOPO_UNDERLAY_IFACE)
            - --node-name-env=NODE_NAME
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: VNTOPO_UNDERLAY_IFACE
              value: ""              # 空 = 自动探测默认路由出接口
          securityContext:
            privileged: true         # 操作 netlink / netns / vxlan
            capabilities:
              add: [NET_ADMIN, SYS_ADMIN, NET_RAW]
          volumeMounts:
            - name: agent-sock-dir
              mountPath: /var/run/vntopo
            - name: host-netns
              mountPath: /var/run/netns
              mountPropagation: HostToContainer
            # M2/M3 真正建链时再挂载容器运行时 socket。当前集群是 Docker（v1.21）：
            #   - name: docker-sock
            #     mountPath: /var/run/docker.sock
            #   - name: host-proc
            #     mountPath: /host/proc
            #     mountPropagation: HostToContainer
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: agent-sock-dir
          hostPath:
            path: /var/run/vntopo
            type: DirectoryOrCreate
        - name: host-netns
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
        # M2/M3 时配套上面 volumeMounts 解开：
        #   - name: docker-sock
        #     hostPath: { path: /var/run/docker.sock, type: Socket }
        #   - name: host-proc
        #     hostPath: { path: /proc, type: Directory }
