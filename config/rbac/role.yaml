---
# vntopo-controller 需要的权限：管理 VNode + Pod + 读 Node + 发 Event。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vntopo-controller-role
rules:
- apiGroups: [vntopo.bupt.site]
  resources: [vnodes]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [vntopo.bupt.site]
  resources: [vnodes/status, vnodes/finalizers]
  verbs: [get, update, patch]
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [pods/status]
  verbs: [get]
- apiGroups: [""]
  resources: [nodes]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, list, watch, create, update, patch, delete]
---
# vntopo-agent 只需要读 VNode/Pod/Node + patch VNode status。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vntopo-agent-role
rules:
- apiGroups: [vntopo.bupt.site]
  resources: [vnodes]
  verbs: [get, list, watch]
- apiGroups: [vntopo.bupt.site]
  resources: [vnodes/status]
  verbs: [get, update, patch]
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [nodes]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
