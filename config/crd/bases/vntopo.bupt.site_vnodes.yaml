---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
  name: vnodes.vntopo.bupt.site
spec:
  group: vntopo.bupt.site
  names:
    kind: VNode
    listKind: VNodeList
    plural: vnodes
    shortNames:
    - vn
    singular: vnode
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.role
      name: Role
      type: string
    - jsonPath: .spec.dataCenter
      name: DC
      type: string
    - jsonPath: .status.hostNode
      name: Node
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: VNode 描述一个虚拟网络节点（virtual node）及其所有出边链路。
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VNodeSpec 是 VNode 的期望状态。
            properties:
              affinity:
                description: |-
                  高级亲和性配置；可与 nodeSelector 叠加，也可单独使用。


                  故意用 Schemaless + PreserveUnknownFields：
                    - 让 controller-gen 不要把 corev1.Affinity 展开成几百行的 OpenAPI schema，
                      避免 K8s 1.21 的 CRD 校验器解析超大嵌套 schema 时报 unmarshal 错误。
                    - 这只影响 CRD schema 校验；Go 侧的反序列化仍然按 corev1.Affinity 严格走。
                x-kubernetes-preserve-unknown-fields: true
              dataCenter:
                description: |-
                  所属数据中心标识。同一 dataCenter 下的所有 VNode 必须共享同一个 nodeSelector
                  （由 webhook 强制校验）。role=r 作为 inter-DC 路由器时可留空。
                type: string
              extraConfigMaps:
                description: |-
                  ExtraConfigMaps 是用户附带的 ConfigMap，controller 创建并自动挂载到主容器。
                  留给高级用户做 escape hatch（角色注入器无法覆盖时手动指定）。
                items:
                  description: |-
                    ExtraConfigMap 描述一个用户附带的 ConfigMap 资源，controller 会以 OwnerReference
                    形式 create/update 它，并自动挂载到主容器指定路径。
                  properties:
                    data:
                      additionalProperties:
                        type: string
                      description: ConfigMap data：键 = 文件名，值 = 文件内容。
                      type: object
                    mountPath:
                      description: 主容器挂载点，例如 "/etc/myapp"。
                      type: string
                    name:
                      description: ConfigMap 名（同 namespace）。空时 controller 自动用 "{vnode-name}-extra-{idx}"。
                      type: string
                    readOnly:
                      description: 是否只读（默认 false）。
                      type: boolean
                  required:
                  - data
                  - mountPath
                  type: object
                type: array
              links:
                description: 本 VNode 对外的所有点对点链路。
                items:
                  description: LinkSpec 描述本 VNode 对外的一条点对点链路。两端必须使用相同的 uid。
                  properties:
                    cost:
                      description: 路由权重 / 链路代价。
                      type: number
                    local_intf:
                      description: 本端在 pod netns 内的接口名，遵循 Linux 接口命名规则，最大 15 字符。
                      maxLength: 15
                      type: string
                    local_ip:
                      description: 本端接口 IP（建议 CIDR 格式，例如 "10.0.0.1/24"）。
                      type: string
                    metrics:
                      description: LinkMetrics 描述链路的运行时指标，可由外部探测器（如 ping_exporter）回填。
                      properties:
                        bandwidth_mbps:
                          type: number
                        jitter_ms:
                          type: number
                        last_updated:
                          format: date-time
                          type: string
                        latency_ms:
                          type: number
                        loss_percentage:
                          type: number
                      type: object
                    peer_intf:
                      description: 对端在 pod netns 内的接口名，遵循 Linux 接口命名规则，最大 15 字符。
                      maxLength: 15
                      type: string
                    peer_ip:
                      description: 对端接口 IP（信息字段，agent 不会写到对端）。
                      type: string
                    peer_pod:
                      description: 对端 VNode 的 name（同 namespace）。
                      type: string
                    uid:
                      description: 链路在所属 namespace 内的唯一 ID，两端必须用同一个值。
                      format: int64
                      minimum: 1
                      type: integer
                  required:
                  - local_intf
                  - peer_intf
                  - peer_pod
                  - uid
                  type: object
                type: array
              localIp:
                description: 兼容字段，部分组件读取 pod 主 IP 用。
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: 显式 nodeSelector。同 DC 的非路由器节点必填，且与同 DC 其它 VNode 一致。
                type: object
              role:
                description: 节点角色。
                enum:
                - host
                - sw
                - asw
                - csw
                - r
                - fw
                - dhcp
                - dns
                - ws
                type: string
              roleConfig:
                description: |-
                  RoleConfig 提供 role 特定的运行时参数（OSPF networks / DHCP 子网 / DNS zone 等）。
                  controller 按 spec.role 选取对应子结构来渲染主容器命令和 ConfigMap data。


                  Schemaless：不同 role 字段差别太大，把 schema 一一展开会让 CRD YAML 过百 KB；
                  实际校验交给 controller 端 + webhook。
                x-kubernetes-preserve-unknown-fields: true
              template:
                description: |-
                  Pod 模板。controller 会在创建 Pod 时注入：
                    · ownerReferences -> VNode
                    · nodeSelector / affinity（来自 spec.nodeSelector / spec.affinity）
                    · labels: vntopo.bupt.site/{role,dc,vnode}
                    · 一个 init container：vntopo-init
                    · M4 起：按 spec.role 自动注入主容器 command / volumes / mounts /
                      securityContext，以及关联的 ConfigMap（OSPF / OVS startup / dhcpd.conf 等）。
                      如果用户在 template.containers[0].command 已自填，则尊重用户值不覆盖。


                  Schemaless 同上，避免展开 PodTemplateSpec 这棵超大 schema 树。
                x-kubernetes-preserve-unknown-fields: true
            required:
            - role
            - template
            type: object
          status:
            description: VNodeStatus 是 VNode 的实际运行状态。
            properties:
              conditions:
                description: 标准 K8s conditions：LinksConverged / PodReady / Validated
                  等。
                items:
                  description: |-
                    Condition contains details for one aspect of the current state of this API Resource.
                    ---
                    This struct is intended for direct use as an array at the field path .status.conditions.  For example,
                    type FooStatus struct{
                        // Represents the observations of a foo's current state.
                        // Known .status.conditions.type are: "Available", "Progressing", and "Degraded"
                        // +patchMergeKey=type
                        // +patchStrategy=merge
                        // +listType=map
                        // +listMapKey=type
                        Conditions []metav1.Condition `json:"conditions,omitempty" patchStrategy:"merge" patchMergeKey:"type" protobuf:"bytes,1,rep,name=conditions"`


                        // other fields
                    }
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configHash:
                description: |-
                  ConfigHash 是 controller 当前期望的 ConfigMap 内容指纹（hex sha256）。
                  每次 controller 渲染并 ensureConfigMaps 后写入。agent 监听到它变化时
                  会 docker exec 主容器执行 reload 命令。
                type: string
              containerID:
                description: sandbox 容器 ID，pod 重建后会变化，agent 据此判断是否要重建链路。
                type: string
              hostIP:
                type: string
              hostNode:
                type: string
              linkStatus:
                items:
                  description: LinkStatus 描述一条链路（按 uid 索引）的实际建立情况。
                  properties:
                    establishedAt:
                      format: date-time
                      type: string
                    lastError:
                      type: string
                    mode:
                      description: LinkMode 表示某条链路的实现模式。
                      enum:
                      - veth
                      - vxlan
                      type: string
                    peer_pod:
                      type: string
                    state:
                      description: LinkState 表示某条链路的当前建立状态。
                      enum:
                      - Pending
                      - Established
                      - Error
                      type: string
                    uid:
                      format: int64
                      type: integer
                    underlayIP:
                      description: 跨节点链路对端节点的 InternalIP。
                      type: string
                    vni:
                      description: VXLAN 模式下使用，由 controller 集中分配。
                      format: int32
                      type: integer
                  required:
                  - uid
                  type: object
                type: array
              netNs:
                description: Pod 的 netns 路径（沿用 meshnet 字段名）。
                type: string
              observedGeneration:
                description: 对应已被 controller 处理过的最新 spec 版本。
                format: int64
                type: integer
              phase:
                description: VNodePhase 表示 VNode 整体生命周期阶段。
                enum:
                - Pending
                - Creating
                - Ready
                - Degraded
                - Deleting
                - Failed
                type: string
              serviceReload:
                description: |-
                  ServiceReload 描述本 VNode 主容器服务的最近一次 reload 状态（M4）。
                  agent 收到 ConfigHash 变化后 exec 容器执行 role-specific reload 命令；
                  这里反映那次执行的结果。
                properties:
                  command:
                    description: 命令（仅展示用，便于 kubectl describe 排障）。
                    items:
                      type: string
                    type: array
                  lastTransitionTime:
                    description: 完成时间。
                    format: date-time
                    type: string
                  message:
                    description: 失败时的错误信息（含 stderr 截断）。
                    type: string
                  observedHash:
                    description: 这次 reload 对应的 ConfigHash（应当等于本 reload 完成时的 status.configHash）。
                    type: string
                  state:
                    description: 状态。
                    enum:
                    - Pending
                    - Success
                    - Failed
                    - NotApplicable
                    type: string
                type: object
              skipped:
                items:
                  description: SkippedItem 沿用 meshnet 字段语义，记录因对端未就绪暂时跳过的链路。
                  properties:
                    link_id:
                      format: int64
                      type: integer
                    pod_name:
                      type: string
                  type: object
                type: array
              srcIP:
                description: Pod 主 IP（沿用）。
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
