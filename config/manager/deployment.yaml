---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vntopo-controller
  namespace: vntopo-system
  labels:
    app.kubernetes.io/name: vntopo-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1   # M0 单副本；生产建议 2 副本 + leader-elect
  selector:
    matchLabels:
      app.kubernetes.io/name: vntopo-operator
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vntopo-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: vntopo-controller
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
      containers:
      - name: controller
        image: controller:dev    # 由 kustomize edit set image 替换
        imagePullPolicy: IfNotPresent
        args:
          - --leader-elect=true
          - --metrics-bind-address=:8080
          - --health-probe-bind-address=:8081
          - --init-image=$(VNTOPO_INIT_IMAGE)
        env:
          - name: VNTOPO_INIT_IMAGE
            value: docker.io/bupt-aiops/vntopo-init:dev
        ports:
          - name: metrics
            containerPort: 8080
          - name: health
            containerPort: 8081
        livenessProbe:
          httpGet: { path: /healthz, port: health }
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet: { path: /readyz, port: health }
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits:   { cpu: 500m, memory: 512Mi }
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
