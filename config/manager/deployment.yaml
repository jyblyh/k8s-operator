---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vntopo-controller
  namespace: vntopo-system
  labels:
    app.kubernetes.io/name: vntopo-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1   # M0 单副本；生产建议 2 副本 + leader-elect
  selector:
    matchLabels:
      app.kubernetes.io/name: vntopo-operator
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vntopo-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: vntopo-controller
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
      containers:
      - name: controller
        image: controller:dev    # 由 kustomize edit set image 替换
        # dev 阶段固定 :dev tag，每次 push 后 rollout restart 即重新拉取。
        # 切到生产/release tag（vX.Y.Z）时再改回 IfNotPresent。
        imagePullPolicy: Always
        args:
          # M1 阶段单副本，关掉 leader-election；后续多副本 HA 时翻回 true
          # 即可（配合下面 RBAC 里 configmaps + leases 权限自动生效）。
          - --leader-elect=false
          - --metrics-bind-address=:8080
          - --health-probe-bind-address=:8081
          - --init-image=$(VNTOPO_INIT_IMAGE)
        env:
          # 由 Makefile deploy 目标用 sed 替换为 $(IMG_INIT)。
          - name: VNTOPO_INIT_IMAGE
            value: __INIT_IMAGE__
        ports:
          - name: metrics
            containerPort: 8080
          - name: health
            containerPort: 8081
        livenessProbe:
          httpGet: { path: /healthz, port: health }
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet: { path: /readyz, port: health }
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits:   { cpu: 500m, memory: 512Mi }
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: { drop: ["ALL"] }
          readOnlyRootFilesystem: true
