# 示例：同节点两个 host 通过 veth 直连
#
# 验证目标：M1 单节点闭环
#   · controller 看到 VNode 会创建对应同名 Pod，并按 nodeSelector 调度到 worker1
#   · M1 阶段链路本身还没建（init 容器拨 agent 会失败 → Pod 进 Init:CrashLoopBackOff）
#     先把 init 注入临时关掉，只验证 Pod 能被创建到正确节点。等 M2 实装 agent
#     的 SetupLinks 后再开 init，那时 ping 才能通。
#
# M1 验证步骤：
#   kubectl apply -f examples/single-host-veth.yaml
#   kubectl -n demo get pods -o wide   # 期望：host1 / host2 都调度到 k8s-large-1665988239
#   kubectl get vn -n demo             # 期望：role / dc / phase 列填好
#   kubectl describe vn host1 -n demo  # 看 status.conditions

---
apiVersion: v1
kind: Namespace
metadata:
  name: demo

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: host1
  namespace: demo
spec:
  role: host
  dataCenter: dc1
  nodeSelector:
    kubernetes.io/hostname: k8s-large-1665988239   # 你集群里的 worker1
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          # 已搬运到你的 ACR；如果还没搬，先在能访问 dockerhub 的机器上：
          #   docker pull nicolaka/netshoot:latest
          #   docker tag  nicolaka/netshoot:latest \
          #     crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/netshoot:latest
          #   docker push crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/netshoot:latest
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:host-debian
          command: ["sleep", "infinity"]
  links:
    - uid: 1
      peer_pod: host2
      local_intf: host1_host2
      peer_intf:  host2_host1
      local_ip:   10.0.0.1/24
      peer_ip:    10.0.0.2/24

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: host2
  namespace: demo
spec:
  role: host
  dataCenter: dc1
  nodeSelector:
    kubernetes.io/hostname: k8s-large-1665988239
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:host-debian
          command: ["sleep", "infinity"]
  links:
    - uid: 1
      peer_pod: host1
      local_intf: host2_host1
      peer_intf:  host1_host2
      local_ip:   10.0.0.2/24
      peer_ip:    10.0.0.1/24
