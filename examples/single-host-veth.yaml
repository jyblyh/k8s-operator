# 示例：同节点两个 host 通过 veth 直连
#
# 验证目标
# ========
# **M1 单节点闭环**：controller 把 VNode 翻译成 Pod，落到指定 worker。
#   · vntopo-init 容器 M1 是 no-op（只打印 env 然后 exit 0）
#   · 链路本身还没真建，host1 ↔ host2 现阶段 ping 不通
#   · M2 中 agent 实装 SetupLinks 后，veth pair 才会建好，ping 才通
#
# **M2** 完成后预期：进入 host1 容器 `ping 10.0.0.2` 应当能通。
#
# 验证命令
# ========
#   kubectl apply -f examples/single-host-veth.yaml
#   kubectl -n demo get pods -o wide   # host1 / host2 都应 Running 在 k8s-large-1665988239
#   kubectl -n demo get vn             # ROLE / DC / PHASE 列应填好
#   kubectl -n demo describe vn host1  # Status.Conditions 应有 Ready=True

---
apiVersion: v1
kind: Namespace
metadata:
  name: demo

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: host1
  namespace: demo
spec:
  role: host
  dataCenter: dc1
  nodeSelector:
    kubernetes.io/hostname: k8s-large-1665988239   # 你集群里的 worker1
  template:
    metadata: {}
    spec:
      containers:
        # 容器名按原项目惯例叫 "pod"，方便 datacrawler / 旧脚本通过 spec.containers[?(@.name=="pod")] 取主容器。
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:host-debian
          command: ["sleep", "infinity"]
  links:
    - uid: 1
      peer_pod: host2
      local_intf: host1_host2
      peer_intf:  host2_host1
      local_ip:   10.0.0.1/24
      peer_ip:    10.0.0.2/24

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: host2
  namespace: demo
spec:
  role: host
  dataCenter: dc1
  nodeSelector:
    kubernetes.io/hostname: k8s-large-1665988239
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:host-debian
          command: ["sleep", "infinity"]
  links:
    - uid: 1
      peer_pod: host1
      local_intf: host2_host1
      peer_intf:  host1_host2
      local_ip:   10.0.0.2/24
      peer_ip:    10.0.0.1/24
