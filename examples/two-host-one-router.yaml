# 示例：两个 host 通过一个路由器互连
#
# 拓扑
# ====
#
#       k8s-large-1665988239                       k8s-large-1665988579
#   ┌─────────────────────────┐               ┌─────────────────────────┐
#   │  host1                  │               │                  host2  │
#   │  pod 主接口  eth0 (CNI) │               │   eth0 (CNI)  pod 主接口│
#   │                         │               │                         │
#   │  host1_r1               │               │               host2_r1  │
#   │  10.0.1.10/24 ──┐       │               │       ┌── 10.0.2.10/24  │
#   │                 │       │               │       │                 │
#   │  default via    │       │               │       │  default via    │
#   │  10.0.1.1       │       │               │       │  10.0.2.1       │
#   └─────────────────┼───────┘               └───────┼─────────────────┘
#                     │                               │
#                     │ uid=1                   uid=2 │
#                     │ (cross-node vxlan)            │ (cross-node vxlan)
#                     │                               │
#                ┌────┴───────────────────────────────┴────┐
#                │ r1 (调度由 K8s 自由决定)                │
#                │   r1_host1: 10.0.1.1/24                 │
#                │   r1_host2: 10.0.2.1/24                 │
#                │   ip_forward = 1                        │
#                │   通过两个直连子网做三层转发            │
#                └─────────────────────────────────────────┘
#
# 验证目标
# ========
#  · 三个 Pod 都 Running
#  · host1 ping r1.eth1 (10.0.1.1) 通  → host1 ↔ r1 link 建好
#  · host1 ping r1.eth2 (10.0.2.1) 通  → r1 转发能力 OK（同 r1 内不同接口）
#  · host1 ping host2 (10.0.2.10) 通    → 三跳全通
#
# 关键设计点
# ==========
#  1. host1 / host2 在不同 worker 节点上 → host↔r1 必走 vxlan
#     (host 节点 ↔ r1 调度到的节点 哪怕同节点也是 veth；不同节点是 vxlan)
#
#  2. r1 不设 nodeSelector → K8s 默认调度，可能落到任意节点
#
#  3. r1 status.hostNode 写入后，agent 反向 watch 会立刻把 host1 / host2
#     重新入队建立跨节点 link，无需等 60s drift scan
#
#  4. r1 容器命令简单：开 ip_forward 后 sleep。
#     **本轮没用 frr/OSPF**：两段直连子网够 r1 自动转发了。
#     后续 M5 做"controller 自动注入 frr ConfigMap + 启动命令"时再演示完整 frr。
#
#  5. host 容器需要等 init 容器把 host1_r1 / host2_r1 接口建好后，
#     再 ip route 配默认路由——所以 command 里有 while loop 等接口出现。

---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-r

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: host1
  namespace: demo-r
spec:
  role: host
  dataCenter: dc1
  nodeSelector:
    kubernetes.io/hostname: k8s-large-1665988239
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:host-debian
          # privileged 是为了让容器内能 ip route add；正式环境用 NET_ADMIN cap 即可
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -c
            - |
              # 等 init 容器把 host1_r1 接口建好（agent 异步建链，可能晚 1-2s）
              echo "waiting for host1_r1 to be created by vntopo-agent..."
              for i in $(seq 1 60); do
                if ip link show host1_r1 >/dev/null 2>&1; then break; fi
                sleep 1
              done
              ip route replace default via 10.0.1.1 dev host1_r1 || true
              echo "default route set, host1 ready"
              ip a; ip route
              sleep infinity
  links:
    - uid: 1
      peer_pod: r1
      local_intf: host1_r1
      peer_intf:  r1_host1
      local_ip:   10.0.1.10/24
      peer_ip:    10.0.1.1/24

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: host2
  namespace: demo-r
spec:
  role: host
  dataCenter: dc2
  nodeSelector:
    kubernetes.io/hostname: k8s-large-1665988579
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:host-debian
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -c
            - |
              echo "waiting for host2_r1 to be created by vntopo-agent..."
              for i in $(seq 1 60); do
                if ip link show host2_r1 >/dev/null 2>&1; then break; fi
                sleep 1
              done
              ip route replace default via 10.0.2.1 dev host2_r1 || true
              echo "default route set, host2 ready"
              ip a; ip route
              sleep infinity
  links:
    - uid: 2
      peer_pod: r1
      local_intf: host2_r1
      peer_intf:  r1_host2
      local_ip:   10.0.2.10/24
      peer_ip:    10.0.2.1/24

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: r1
  namespace: demo-r
spec:
  role: r
  # 故意不设 nodeSelector / dataCenter：r 类节点由 K8s 调度
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:firewall-v2
          # privileged 是 frr 镜像的硬要求（要操作 raw socket / netlink）
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -c
            - |
              # 开转发，让 r1 成为真正的路由器
              echo 1 > /proc/sys/net/ipv4/ip_forward
              # 等 vntopo-agent 把两条接口都建好（uid=1 上的 r1_host1，uid=2 上的 r1_host2）
              echo "waiting for r1_host1 / r1_host2 to be created by vntopo-agent..."
              for i in $(seq 1 60); do
                if ip link show r1_host1 >/dev/null 2>&1 && ip link show r1_host2 >/dev/null 2>&1; then
                  break
                fi
                sleep 1
              done
              echo "router interfaces ready:"
              ip a; ip route
              # 直连两段子网够用了，无需 OSPF。frr 不启动也不影响转发。
              sleep infinity
  links:
    - uid: 1
      peer_pod: host1
      local_intf: r1_host1
      peer_intf:  host1_r1
      local_ip:   10.0.1.1/24
      peer_ip:    10.0.1.10/24
    - uid: 2
      peer_pod: host2
      local_intf: r1_host2
      peer_intf:  host2_r1
      local_ip:   10.0.2.1/24
      peer_ip:    10.0.2.10/24
