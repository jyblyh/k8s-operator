# 示例：两个 host 通过一个路由器互连（M4 新写法：roleConfig 自动注入）
#
# 拓扑
# ====
#
#       k8s-large-1665988239                       k8s-large-1665988579
#   ┌─────────────────────────┐               ┌─────────────────────────┐
#   │  host1                  │               │                  host2  │
#   │  pod 主接口  eth0 (CNI) │               │   eth0 (CNI)  pod 主接口│
#   │                         │               │                         │
#   │  host1_r1               │               │               host2_r1  │
#   │  10.0.1.10/24 ──┐       │               │       ┌── 10.0.2.10/24  │
#   │                 │       │               │       │                 │
#   │  default via    │       │               │       │  default via    │
#   │  10.0.1.1       │       │               │       │  10.0.2.1       │
#   └─────────────────┼───────┘               └───────┼─────────────────┘
#                     │                               │
#                     │ uid=1                   uid=2 │
#                     │ (cross-node vxlan)            │ (cross-node vxlan)
#                     │                               │
#                ┌────┴───────────────────────────────┴────┐
#                │ r1 (调度由 K8s 自由决定)                │
#                │   r1_host1: 10.0.1.1/24                 │
#                │   r1_host2: 10.0.2.1/24                 │
#                │   ip_forward = 1 + frr OSPF             │
#                └─────────────────────────────────────────┘
#
# M3 vs M4 写法对比
# =================
#
# M3 写法（M3.5 example）：
#   spec:
#     template:
#       spec:
#         containers:
#         - name: pod
#           securityContext: { privileged: true }
#           command: [/bin/bash, -c, "echo 1 > ...; for i in seq 1 60; do ...]
#
#   缺点：每个 VNode 都要重复写一遍 wait-for-link / ip route / ip_forward 模板。
#         拓扑大了写错一个字符 debug 半天。
#
# M4 写法（本文件）：
#   spec:
#     template:
#       spec:
#         containers:
#         - name: pod        # 镜像必填
#           image: ...
#           # command/securityContext/挂载/ConfigMap 全部由 controller 注入
#     roleConfig:
#       host:                # role=host 时填这里，控制器渲染默认网关 + 静态路由
#         defaultGateway: 10.0.1.1
#       router:              # role=r  时填这里，控制器渲染 frr.conf + ospf
#         ospfNetworks: [10.0.1.0/24, 10.0.2.0/24]
#
#   收益：
#   1) 写法极简，关注业务（IP/网段），不关注脚本（ip route）
#   2) ConfigMap reload：以后改 ospfNetworks，controller 重渲染 ConfigMap，
#      agent docker exec frrinit.sh restart 自动 reload，不用重建 Pod
#
# 验证目标
# ========
#  · 三个 Pod 都 Running、status.phase=Ready
#  · host1 ping r1.eth1 (10.0.1.1) 通  → host1 ↔ r1 link 建好（cross-node vxlan）
#  · host1 ping r1.eth2 (10.0.2.1) 通  → r1 转发能力 OK
#  · host1 ping host2 (10.0.2.10) 通    → 三跳全通（host1 ↔ r1 ↔ host2）
#  · 三个 VNode 的 status.configHash / status.serviceReload 都显示出来：
#      - host1 / host2: serviceReload.state = NotApplicable
#      - r1: serviceReload.state = Success（OSPF reload 成功）
#  · 改 r1.spec.roleConfig.router.ospfNetworks（添加新网段）后：
#      - controller 更新 frr ConfigMap
#      - r1.status.configHash 变化
#      - agent 检测到 hash 变化 → docker exec frrinit.sh restart
#      - r1.status.serviceReload.observedHash 跟上新值
#      - 全程不重建 Pod

---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-r

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: host1
  namespace: demo-r
spec:
  role: host
  dataCenter: dc1
  nodeSelector:
    kubernetes.io/hostname: k8s-large-1665988239
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:host-debian
          # 不写 command/securityContext —— controller 会按 roleConfig.host 自动注入
  roleConfig:
    host:
      defaultGateway: 10.0.1.1
  links:
    - uid: 1
      peer_pod: r1
      local_intf: host1_r1
      peer_intf:  r1_host1
      local_ip:   10.0.1.10/24
      peer_ip:    10.0.1.1/24

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: host2
  namespace: demo-r
spec:
  role: host
  dataCenter: dc2
  nodeSelector:
    kubernetes.io/hostname: k8s-large-1665988579
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:host-debian
  roleConfig:
    host:
      defaultGateway: 10.0.2.1
  links:
    - uid: 2
      peer_pod: r1
      local_intf: host2_r1
      peer_intf:  r1_host2
      local_ip:   10.0.2.10/24
      peer_ip:    10.0.2.1/24

---
apiVersion: vntopo.bupt.site/v1alpha1
kind: VNode
metadata:
  name: r1
  namespace: demo-r
spec:
  role: r
  # 故意不设 nodeSelector / dataCenter：r 类节点由 K8s 调度
  template:
    metadata: {}
    spec:
      containers:
        - name: pod
          image: crpi-lz7p74weyijj71uf.cn-beijing.personal.cr.aliyuncs.com/yyc20001209/yyc:firewall-v2
          # 不写 command/securityContext —— controller 会按 roleConfig.router 自动注入：
          #   - command: 开 ip_forward + 启 frrinit.sh start + 等接口 + sleep
          #   - securityContext.privileged: true
          #   - volumeMount /etc/frr -> ConfigMap "r1-frr" (含 daemons + frr.conf + vtysh.conf)
          #   - volumeMount /var/run/frr -> emptyDir
  roleConfig:
    router:
      # OSPF 通告本路由器直连的两段子网
      # 改这里 → controller 重渲染 ConfigMap → agent 自动 frrinit.sh restart（不重建 Pod）
      ospfNetworks:
        - 10.0.1.0/24
        - 10.0.2.0/24
      # routerId 不写时，controller 自动从 spec.links[0].local_ip 派生
  links:
    - uid: 1
      peer_pod: host1
      local_intf: r1_host1
      peer_intf:  host1_r1
      local_ip:   10.0.1.1/24
      peer_ip:    10.0.1.10/24
    - uid: 2
      peer_pod: host2
      local_intf: r1_host2
      peer_intf:  host2_r1
      local_ip:   10.0.2.1/24
      peer_ip:    10.0.2.10/24
